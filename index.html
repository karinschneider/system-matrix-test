<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>COMMONS ON DEMAND | 24H</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { 
            --bg: #000000; 
            --text: #ffffff; 
            --accent: #cccccc;
            --border: #333333;
            --pink: #c45c7a;
            --yellow: #d4c84a;
            --grey: #888888;
            --view-bg: #000000;
        }
        body.light-mode { 
            --bg: #ffffff; 
            --text: #000000; 
            --accent: #333333;
            --border: #dddddd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: var(--bg); 
            color: var(--text); 
            overflow: hidden;
            width: 100vw; height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* HEADER */
        #header {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            pointer-events: none;
        }
        #header > * { pointer-events: auto; }

        .title { 
            font-size: 13px; font-weight: bold; letter-spacing: 3px; 
            text-transform: uppercase; cursor: pointer; user-select: none;
            color: var(--text);
        }

        .btn { 
            background: none; border: 1px solid var(--text); color: var(--text);
            padding: 4px 10px; font-size: 9px; cursor: pointer; text-transform: uppercase;
            transition: 0.2s; letter-spacing: 1px; font-weight: bold;
        }
        .btn:hover { background: var(--text); color: var(--bg); }
        .btn.active { background: var(--text); color: var(--bg); }

        /* FLOATING CANVAS */
        #canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
        }

        /* IDENTITY SHAPES — circles (makers) and ovals (curators) */
        .identity-wrap {
            position: absolute; cursor: pointer; user-select: none;
        }
        .identity-inner {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s;
        }
        .identity-inner:hover { opacity: 0.65; }
        .identity-circle { border-radius: 50%; border: 1px solid var(--pink); }
        .identity-oval   { border-radius: 50%; border: 1px solid var(--yellow); }
        .identity-initials {
            font-size: 10px; font-weight: bold; letter-spacing: 2px;
            text-transform: uppercase; color: var(--text); opacity: 0.85;
            pointer-events: none;
        }
        .identity-name {
            position: absolute; bottom: -18px; left: 50%;
            transform: translateX(-50%);
            font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
            color: var(--accent); opacity: 0.45; white-space: nowrap;
            pointer-events: none;
        }
        .identity-cd {
            position: absolute; top: -16px; left: 50%;
            transform: translateX(-50%);
            font-size: 7px; font-family: monospace; letter-spacing: 1px;
            color: var(--accent); opacity: 0.45; white-space: nowrap;
            pointer-events: none;
        }
        .identity-cd.urgent { color: #ff4444; opacity: 1; }

        /* WORK SHAPES — exactly as original DATAROOM */
        .shape-wrap {
            position: absolute;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .shape-wrap:hover { opacity: 0.75; }
        .shape-wrap.expired { opacity: 0.2; pointer-events: none; }

        .shape-video {
            border: 1px solid var(--pink);
            background: transparent;
        }
        .shape-performance {
            border: 1px solid var(--pink);
            border-radius: 50%;
            background: transparent;
        }
        .shape-sound {
            border: 1px solid var(--grey);
            background: transparent;
        }
        .shape-code {
            border: 1px solid var(--pink);
            background: transparent;
        }
        .shape-image {
            border: 1px solid var(--grey);
            background: transparent;
        }

        /* Title centered in shape */
        .shape-title {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text); opacity: 0.55;
            pointer-events: none; text-align: center;
            width: calc(100% - 20px);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .shape-label {
            position: absolute;
            bottom: 10px; left: 12px;
            font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
            color: var(--text); opacity: 0.4;
            pointer-events: none;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: calc(100% - 80px);
        }

        .shape-countdown {
            position: absolute;
            top: 10px; right: 10px;
            font-size: 8px; letter-spacing: 1px;
            color: var(--accent); opacity: 0.6;
            font-family: monospace;
            pointer-events: none;
        }
        .shape-countdown.urgent { color: #ff4444; opacity: 1; }

        .shape-actions {
            position: absolute; top: 8px; left: 8px;
            display: none; gap: 6px;
        }
        body.admin-active .shape-actions { display: flex; }
        .shape-action-btn {
            font-size: 13px; cursor: pointer; opacity: 0.4;
            color: var(--text); transition: 0.2s;
            background: none; border: none; padding: 0;
        }
        .shape-action-btn:hover { opacity: 1; }
        .shape-del-btn:hover { color: #ff0000; }

        /* CLUSTER VIEW */
        #cluster-view {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg); z-index: 200; display: none; overflow: hidden;
        }
        #cluster-header {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 300; pointer-events: none;
        }
        #cluster-header > * { pointer-events: auto; }
        #cluster-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; }
        .cluster-name { font-size: 11px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; color: var(--text); }
        .cluster-sub  { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); opacity: 0.4; margin-top: 3px; }

        /* PROFILE OVERLAY */
        #profile-section {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.92); z-index: 5000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }
        body.light-mode #profile-section { background: rgba(255,255,255,0.92); }

        /* BOTTOM BAR */
        #bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 14px 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            font-family: monospace; font-size: 9px;
            color: var(--accent);
            pointer-events: none;
        }
        #bottom-bar > * { pointer-events: auto; }
        #console-display { opacity: 0.5; }
        .db-controls { display: flex; gap: 20px; }
        .db-controls span { cursor: pointer; opacity: 0.4; transition: 0.2s; }
        .db-controls span:hover { opacity: 1; }

        /* LEGEND */
        #legend {
            position: fixed; bottom: 36px; right: 30px;
            display: flex; flex-direction: column; gap: 8px;
            z-index: 100; pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); opacity: 0.3; }
        .leg-circle { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--pink); flex-shrink: 0; }
        .leg-oval   { width: 18px; height: 11px; border-radius: 50%; border: 1px solid var(--yellow); flex-shrink: 0; }

        /* REGISTRATION OVERLAY — original DATAROOM form */
        #reg-section { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.92); z-index: 5000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }
        body.light-mode #reg-section { background: rgba(255,255,255,0.92); }

        .form-container { 
            width: 90%; max-width: 580px; padding: 28px; 
            border: 1px solid var(--text); background: var(--bg); 
            position: relative; max-height: 90vh; overflow-y: auto;
        }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 9px; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; display: block; letter-spacing: 1px; font-weight: bold; }
        input, select, textarea { 
            background: none; border: 1px solid var(--border); padding: 7px 8px; 
            color: var(--text); font-size: 11px; width: 100%;
            font-family: inherit; border-radius: 0; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--text); }
        textarea { grid-column: span 2; height: 48px; resize: none; }
        .form-close {
            position: absolute; top: 12px; right: 16px; cursor: pointer;
            font-size: 22px; color: var(--text); opacity: 0.4; transition: 0.2s;
        }
        .form-close:hover { opacity: 1; }

        #form-preview-container {
            grid-column: span 2; height: 110px; background: #111; border: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center; margin-bottom: 4px;
            overflow: hidden;
        }
        body.light-mode #form-preview-container { background: #eee; }
        #form-preview-container img, #form-preview-container video { max-height: 100%; max-width: 100%; object-fit: contain; }

        /* VIEWING ROOM */
        #viewing-room {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--view-bg); z-index: 6000; display: none;
            justify-content: center; align-items: center;
        }
        #media-container { 
            width: 100%; height: 100%; display: flex; 
            justify-content: center; align-items: center; 
            padding: 80px; 
        }
        .video-js { width: 100% !important; height: 100% !important; }

        .view-controls { 
            position: absolute; top: 24px; right: 24px; z-index: 7000; 
            display: flex; gap: 8px; align-items: center; 
        }
        .bg-toggle { width: 16px; height: 16px; border: 1px solid rgba(128,128,128,0.4); cursor: pointer; transition: 0.2s; }
        .bg-toggle.black { background: #000; }
        .bg-toggle.white { background: #fff; }
        .bg-toggle.grey  { background: #888; }
        .bg-toggle:hover { transform: scale(1.2); }
        .close-btn { 
            background: var(--text); color: var(--bg); border: none; 
            padding: 8px 16px; font-size: 10px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-left: 16px; 
        }

        /* INVITE OVERLAY */
        #invite-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.92); z-index: 5500;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }
        .invite-box {
            width: 90%; max-width: 500px;
            border: 1px solid var(--text); background: var(--bg);
            padding: 28px; position: relative;
        }
        .invite-box h3 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
        .invite-msg {
            font-family: monospace; font-size: 11px; line-height: 1.7;
            border: 1px solid var(--border); padding: 12px;
            color: var(--accent); margin-bottom: 14px;
            white-space: pre-wrap; word-break: break-all;
        }
        .invite-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .admin-only { display: none; }
        body.admin-active .admin-only { display: inline-block; }
    </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
    <div class="title" onclick="secretHandshake()">COMMONS ON DEMAND</div>
    <div style="display:flex; gap:8px; align-items:center;">
        <span id="live-count" style="font-size:9px; letter-spacing:1px; opacity:0.4; font-family:monospace;"></span>
        <button class="btn admin-only" id="profile-btn" onclick="openProfileForm()">+ CREATE PROFILE</button>

</div>

<!-- MAIN CANVAS -->
<div id="canvas"></div>

<!-- LEGEND -->
<div id="legend">

</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">

    <div class="db-controls">
        <span class="admin-only" onclick="exportData()">EXPORT</span>
    </div>
</div>

<!-- CLUSTER VIEW -->
<div id="cluster-view">
    <div id="cluster-header">

            <div class="cluster-name" id="cluster-name-el">—</div>

<!-- PROFILE OVERLAY -->
<div id="profile-section" onclick="if(event.target.id==='profile-section')closeProfileForm()">

<!-- WORK UPLOAD OVERLAY — original DATAROOM form, unchanged -->

        <div class="form-close" onclick="toggleReg()">×</div>

        <div id="form-preview-container">

                <label>Viewer access code</label>

            <button type="submit" id="submit-btn" class="btn" style="grid-column:span 2; margin-top:8px; padding:10px; font-size:10px;">COMMIT — 24H CLOCK STARTS NOW</button>

</div>

<!-- VIEWING ROOM -->

    <div class="view-controls">

</div>

        </div>

<script>
// Backend Worker — change this to https://api.commons-on-demand.com/ once that
// custom domain finishes connecting (see README → TASKS → IN PROGRESS).
const WORKER_URL    = 'https://commons-on-demand-api.pb6w4bwg2n.workers.dev';
const DATAROOM_URL  = window.location.href.split('?')[0];

// Studio login persists across reloads via localStorage — only the access
// code itself is stored, never any actual artist data.
let authCode = localStorage.getItem('cod_auth') || null;
let isAdmin  = !!authCode;

let makers       = [];
let archive      = [];
let makerPos     = {};
let workPos      = {};
let cdTimers     = {};
let currentMaker = null;
let activeWork   = null;
let vjsPlayer    = null;
let positions    = {}; // alias for work positions on cluster canvas

/* ── API HELPER — every authenticated call goes through this ── */
async function apiFetch(path, options = {}) {
    const headers = Object.assign({}, options.headers);
    if (authCode) headers['Authorization'] = 'Bearer ' + authCode;
    const res = await fetch(WORKER_URL + path, Object.assign({}, options, { headers }));
    if (res.status === 401) {
        isAdmin = false; authCode = null;
        localStorage.removeItem('cod_auth');
        document.body.classList.remove('admin-active');
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        alert('Studio session expired — please log in again.');
        renderMain();
        if (currentMaker) renderCluster();
        throw new Error('unauthorized');
    }
    return res;
}

/* ── LOAD — always pulls the live, current state from the Worker/D1 ── */
async function loadArchive() {
    try {
        const res = await fetch(WORKER_URL + '/api/data?nc=' + Date.now());
        if (!res.ok) throw new Error('server error');
        const data = await res.json();
        makers  = data.makers  || [];
        archive = data.archive || [];
        log('LOADED // ' + archive.length + ' WORKS');
    } catch (e) {
        makers = []; archive = [];
        log('OFFLINE // COULD NOT REACH SERVER');
    }
    renderMain();
}

/* ── MAIN CANVAS — identity shapes ── */
function renderMain() {
    const canvas = document.getElementById('canvas');
    Object.values(cdTimers).forEach(t => clearInterval(t));
    cdTimers = {};
    canvas.innerHTML = '';

    const now    = Date.now();
    const active = makers.filter(m => {
        if (!m.uploadTime) return true;
        return (now - m.uploadTime) < 24 * 60 * 60 * 1000;
    });

    document.getElementById('live-count').textContent = active.length + ' LIVE';

    active.forEach((maker, i) => {
        const isCurator = maker.role === 'curator';
        const W = isCurator ? 110 : 88;
        const H = isCurator ? 66  : 88;

        if (!makerPos[maker.id]) {
            const mxX = Math.max(60, window.innerWidth  - W - 100);
            const mxY = Math.max(80, window.innerHeight - H - 100);
            makerPos[maker.id] = {
                x: 80 + (i * 157 + Math.floor(i * 0.6 * mxX)) % mxX,
                y: 80 + (i * 103 + Math.floor(i * 0.5 * mxY)) % mxY
            };
        }
        const pos = makerPos[maker.id];

        const wrap = document.createElement('div');
        wrap.className = 'identity-wrap';
        wrap.style.cssText = `left:${pos.x}px;top:${pos.y}px;width:${W}px;height:${H}px;`;
        wrap.dataset.id = maker.id;

        const inner = document.createElement('div');
        inner.className = 'identity-inner ' + (isCurator ? 'identity-oval' : 'identity-circle');

        const init = document.createElement('div');
        init.className   = 'identity-initials';
        init.textContent = maker.initials || getInitials(maker.name);
        inner.appendChild(init);
        wrap.appendChild(inner);

        const nameEl = document.createElement('div');
        nameEl.className   = 'identity-name';
        nameEl.textContent = maker.name || '';
        wrap.appendChild(nameEl);

        if (maker.uploadTime) {
            const cdEl = document.createElement('div');
            cdEl.className = 'identity-cd';
            wrap.appendChild(cdEl);
            cdTimers[maker.id] = setInterval(() => {
                const rem = (maker.uploadTime + 24*60*60*1000) - Date.now();
                if (rem <= 0) { clearInterval(cdTimers[maker.id]); wrap.remove(); return; }
                const h=Math.floor(rem/3600000), m=Math.floor((rem%3600000)/60000), s=Math.floor((rem%60000)/1000);
                cdEl.textContent = pad(h)+':'+pad(m)+':'+pad(s);
                if (rem < 3600000) cdEl.classList.add('urgent');
            }, 1000);
        }

        // admin: edit + delete
        if (isAdmin) {
            const eb = document.createElement('button');
            eb.textContent = '✎';
            eb.style.cssText = 'position:absolute;top:-14px;left:0;background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;opacity:0;transition:0.15s;';
            const db = document.createElement('button');
            db.textContent = '×';
            db.style.cssText = 'position:absolute;top:-14px;right:0;background:none;border:none;color:#ff4444;font-size:14px;cursor:pointer;opacity:0;transition:0.15s;';
            wrap.addEventListener('mouseenter', ()=>{ eb.style.opacity='0.8'; db.style.opacity='0.8'; });
            wrap.addEventListener('mouseleave', ()=>{ eb.style.opacity='0'; db.style.opacity='0'; });
            eb.onclick = (e)=>{ e.stopPropagation(); openEditProfile(maker.id); };
            db.onclick  = (e)=>{ e.stopPropagation(); deleteMaker(maker.id); };
            wrap.appendChild(eb); wrap.appendChild(db);
        }

        wrap.onclick = () => {
            if (wrap._dragged) { wrap._dragged=false; return; }
            if (!isAdmin && maker.accessCode && maker.accessCode !== '') {
                const pass = prompt('Enter access code:');
                if (!pass || pass.trim() !== maker.accessCode.trim()) { alert('INVALID CODE'); return; }
            }
            openCluster(maker);
        };

        makeDraggableIdentity(wrap, maker.id);
        canvas.appendChild(wrap);
    });

    log('COMMONS_ON_DEMAND // ' + active.length + ' LIVE');
}

/* ── CLUSTER ── */

    if (cdTimers['_cluster']) clearInterval(cdTimers['_cluster']);

        cdTimers['_cluster'] = setInterval(()=>{
            const rem = (maker.uploadTime + 24*60*60*1000) - Date.now();
            if (rem<=0){cdEl.textContent='EXPIRED';return;}
            const h=Math.floor(rem/3600000),m=Math.floor((rem%3600000)/60000),s=Math.floor((rem%60000)/1000);
            cdEl.textContent=pad(h)+':'+pad(m)+':'+pad(s);
            if(rem<3600000) cdEl.style.color='#ff4444';
        },1000);
    }

}

function closeCluster() {
    document.getElementById('cluster-view').style.display = 'none';
    if (cdTimers['_cluster']) clearInterval(cdTimers['_cluster']);
    currentMaker = null;
}

function renderCluster() {
    const canvas = document.getElementById('cluster-canvas');
    Object.keys(cdTimers).filter(k=>k.startsWith('w_')).forEach(k=>{clearInterval(cdTimers[k]);delete cdTimers[k];});
    canvas.innerHTML = '';

    const works = archive.filter(w => w.makerId === (currentMaker && currentMaker.id));

    works.forEach((item, i) => {
        const geo = shapeGeometry(item.mode);
        const wrap = document.createElement('div');
        wrap.className = 'shape-wrap';
        wrap.dataset.id = item.id;

        if (!workPos[item.id]) {
            const mxX = Math.max(50, window.innerWidth  - geo.w - 80);
            const mxY = Math.max(80, window.innerHeight - geo.h - 80);
            workPos[item.id] = {
                x: 60 + (i * 137 + Math.floor(i * 0.7 * mxX)) % mxX,
                y: 60 + (i * 89  + Math.floor(i * 0.5 * mxY)) % mxY
            };
        }
        const pos = workPos[item.id];
        wrap.style.left = pos.x+'px'; wrap.style.top = pos.y+'px';
        wrap.style.width = geo.w+'px'; wrap.style.height = geo.h+'px';

        const shape = document.createElement('div');
        shape.className = geo.cls;
        shape.style.width='100%'; shape.style.height='100%'; shape.style.position='relative';
        if (geo.type==='circle') shape.style.borderRadius='50%';

        // Title CENTERED
        const titleEl = document.createElement('div');
        titleEl.className = 'shape-title';
        titleEl.textContent = item.title || 'UNTITLED';
        shape.appendChild(titleEl);

        // Artist bottom-left (smaller, dimmer)
        const label = document.createElement('div');
        label.className = 'shape-label';
        label.textContent = item.artist || '';
        shape.appendChild(label);

        // Countdown top-right
        const cd = document.createElement('div');
        cd.className = 'shape-countdown';
        shape.appendChild(cd);
        if (item.uploadTime) {
            cdTimers['w_'+item.id] = setInterval(()=>{
                const rem=(item.uploadTime+24*60*60*1000)-Date.now();
                if(rem<=0){clearInterval(cdTimers['w_'+item.id]);cd.textContent='EXPIRED';wrap.classList.add('expired');return;}
                const h=Math.floor(rem/3600000),m=Math.floor((rem%3600000)/60000),s=Math.floor((rem%60000)/1000);
                cd.textContent=pad(h)+':'+pad(m)+':'+pad(s);
                if(rem<3600000)cd.classList.add('urgent');
            },1000);
        }

        // Invite btn
        const invBtn = document.createElement('button');
        invBtn.textContent='INVITE';
        invBtn.style.cssText='position:absolute;bottom:10px;right:10px;background:none;border:none;font-size:8px;letter-spacing:1px;color:var(--accent);cursor:pointer;text-transform:uppercase;opacity:0.5;padding:2px 4px;';
        invBtn.onmouseenter=()=>invBtn.style.opacity='1';
        invBtn.onmouseleave=()=>invBtn.style.opacity='0.5';
        invBtn.onclick=(e)=>{e.stopPropagation();showInvite(item);};
        shape.appendChild(invBtn);

        // Admin actions
        const actions = document.createElement('div');
        actions.className='shape-actions';
        const editBtn=document.createElement('button');
        editBtn.className='shape-action-btn';editBtn.textContent='✎';
        editBtn.onclick=(e)=>{e.stopPropagation();openEditForm(e,item.id);};
        const delBtn=document.createElement('button');
        delBtn.className='shape-action-btn shape-del-btn';delBtn.textContent='×';
        delBtn.onclick=(e)=>{e.stopPropagation();deleteWork(item.id);};
        actions.appendChild(editBtn);actions.appendChild(delBtn);
        shape.appendChild(actions);

        wrap.appendChild(shape);
        wrap.onclick=()=>activateWork(item);
        makeDraggableWork(wrap, item.id);
        canvas.appendChild(wrap);
    });
}

function shapeGeometry(mode) {
    switch(mode) {
        case 'VIDEO':       return { w:280, h:180, type:'rect',   cls:'shape-video' };
        case 'PERFORMANCE': return { w:200, h:200, type:'circle', cls:'shape-performance' };
        case 'SOUND':       return { w:120, h:120, type:'rect',   cls:'shape-sound' };
        case 'WWW':         return { w:340, h:80,  type:'rect',   cls:'shape-code' };
        case 'SOCIAL':      return { w:160, h:44,  type:'rect',   cls:'shape-code' };
        case 'IMAGE':       return { w:220, h:160, type:'rect',   cls:'shape-image' };
        default:            return { w:200, h:140, type:'rect',   cls:'shape-image' };
    }
}

/* ── DRAG ── */
function makeDraggableIdentity(el, id) {
    let down=false,sx,sy,ox,oy;
    el.addEventListener('mousedown',(e)=>{
        if(e.target.tagName==='BUTTON')return;
        down=true;el._dragged=false;
        sx=e.clientX;sy=e.clientY;
        ox=parseFloat(el.style.left);oy=parseFloat(el.style.top);
        e.preventDefault();
    });
    window.addEventListener('mousemove',(e)=>{
        if(!down)return;
        const dx=e.clientX-sx,dy=e.clientY-sy;
        if(Math.abs(dx)>4||Math.abs(dy)>4)el._dragged=true;
        el.style.left=(ox+dx)+'px';el.style.top=(oy+dy)+'px';
        makerPos[id]={x:ox+dx,y:oy+dy};
    });
    window.addEventListener('mouseup',()=>{down=false;});
}

function makeDraggableWork(el, id) {
    let down=false,sx,sy,ox,oy;
    el.addEventListener('mousedown',(e)=>{
        if(e.target.tagName==='BUTTON')return;
        down=true;el._dragged=false;
        sx=e.clientX;sy=e.clientY;
        ox=parseFloat(el.style.left);oy=parseFloat(el.style.top);
        e.preventDefault();
    });
    window.addEventListener('mousemove',(e)=>{
        if(!down)return;
        const dx=e.clientX-sx,dy=e.clientY-sy;
        if(Math.abs(dx)>4||Math.abs(dy)>4)el._dragged=true;
        el.style.left=(ox+dx)+'px';el.style.top=(oy+dy)+'px';
        workPos[id]={x:ox+dx,y:oy+dy};
    });
    window.addEventListener('mouseup',()=>{down=false;});
}

/* ── ACTIVATE / WATCH — original DATAROOM logic ── */
function activateWork(item) {
    if (item.accessCode && item.accessCode !== '') {
        const pass = prompt('Enter access code to watch:');
        if (!pass || pass.trim() !== item.accessCode.trim()) {
            alert('INVALID_CODE // ACCESS_DENIED'); return;
        }
    }
    openRoom(item);
}

function openRoom(item) {
    const room = document.getElementById('viewing-room');
    const container = document.getElementById('media-container');
    if (vjsPlayer) { vjsPlayer.dispose(); vjsPlayer=null; }
    container.innerHTML = '';
    room.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    activeWork = item;

    if (item.mode==='WWW' && item.linkUrl) { window.open(item.linkUrl,'_blank'); closeRoom(); return; }

    const cleanPath = (item.manualPath||'').split('?')[0].toLowerCase();
    const ext = cleanPath.split('.').pop();
    const isVideo = ['mp4','mov','webm','avi','mkv','m4v','ogv'].includes(ext);
    const isAudio = ['mp3','m4a','wav','ogg','aac'].includes(ext);

    if (isVideo) {
        const isDropbox = item.manualPath.includes('dropbox.com');
        if (isDropbox) {
            /* Dropbox: convert to direct streaming URL — original working method */
            const streamUrl = item.manualPath
                .replace('www.dropbox.com','dl.dropboxusercontent.com')
                .replace('?dl=0','')
                .replace('?dl=1','')
                .replace('?raw=1','')
                .split('?')[0];
            const iframe = document.createElement('iframe');
            iframe.src = streamUrl;
            iframe.style.cssText='width:100%;height:100%;border:none;';
            iframe.setAttribute('allowfullscreen','');
            iframe.setAttribute('allow','autoplay');
            container.appendChild(iframe);
        } else {
            /* Backblaze B2 via Cloudflare or any direct URL */
            const vidEl = document.createElement('video');
            vidEl.setAttribute('controls','');
            vidEl.setAttribute('autoplay','');
            vidEl.setAttribute('playsinline','');
            vidEl.style.cssText='max-width:100%;max-height:100%;width:auto;height:auto;';
            vidEl.src = item.manualPath;
            vidEl.onerror=()=>{container.innerHTML='<div style="color:#fff;font-family:monospace;font-size:11px;text-align:center;">MEDIA NOT FOUND</div>';};
            container.appendChild(vidEl);
            vidEl.play().catch(()=>{vidEl.muted=true;vidEl.play();});
        }
    } else if (isAudio) {
        const wrap = document.createElement('div');
        wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:20px;';
        const t = document.createElement('div');
        t.style.cssText='color:#fff;font-family:monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;';
        t.textContent=item.title;
        const audio=document.createElement('audio');
        audio.controls=true;audio.autoplay=true;audio.src=item.manualPath;
        audio.style.cssText='width:380px;max-width:80vw;';
        wrap.appendChild(t);wrap.appendChild(audio);
        container.appendChild(wrap);
    } else {
        const img=document.createElement('img');
        img.src=item.manualPath;
        img.style.cssText='max-width:85%;max-height:85%;object-fit:contain;';
        img.onerror=()=>{container.innerHTML='<div style="color:#fff;font-family:monospace;font-size:11px;">MEDIA NOT FOUND</div>';};
        container.appendChild(img);
    }
}

function closeRoom() {
    if(vjsPlayer){vjsPlayer.dispose();vjsPlayer=null;}
    document.getElementById('viewing-room').style.display='none';
    document.getElementById('media-container').innerHTML='';
    document.body.style.overflow='hidden';

}

function toggleReg(reset=true){
    const s=document.getElementById('reg-section');

    if(reset&&hidden){
        document.getElementById('archiveForm').reset();

function generateCode(fieldId){
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code='';
    for(let i=0;i<6;i++)code+=chars[Math.floor(Math.random()*chars.length)];
    document.getElementById(fieldId).value=code;
}

let pendingUpload = null;
function handleFileSelection(input){
    const file=input.files[0];if(!file)return;
    const container=document.getElementById('form-preview-container');
    const src=URL.createObjectURL(file);
    if(file.type.startsWith('video')){
        container.innerHTML=`<video src="${src}" muted preload="metadata" style="pointer-events:none;max-height:100%;"></video>`;
    } else if(file.type.startsWith('audio')){
        container.innerHTML=`<div style="font-family:monospace;font-size:11px;opacity:0.5;">♪ ${file.name}</div>`;
    } else {
        container.innerHTML=`<img src="${src}" style="max-height:100%;max-width:100%;object-fit:contain;">`;
    }

    const pathField=document.getElementById('manualPath');
    const submitBtn=document.getElementById('submit-btn');
    const originalLabel=submitBtn.textContent;
    pathField.value='UPLOADING…'; pathField.disabled=true;
    submitBtn.disabled=true; submitBtn.textContent='UPLOADING FILE…';
    log('UPLOADING…');

    const fd=new FormData(); fd.append('file', file);
    pendingUpload = apiFetch('/api/upload', { method:'POST', body:fd })
        .then(res=>res.json())
        .then(data=>{
            if(data.error) throw new Error(data.error);
            pathField.value=data.url;
            log('UPLOAD_COMPLETE');
        })
        .catch(err=>{
            pathField.value='';
            if(err.message!=='unauthorized') alert('Upload failed: '+err.message);
            log('UPLOAD_ERROR');
        })
        .finally(()=>{
            pathField.disabled=false;
            submitBtn.disabled=false; submitBtn.textContent=originalLabel;
            pendingUpload=null;
        });
}

function sanitizeMediaPath(path){
    const match = path.match(/^https?:\/\/f\d+\.backblazeb2\.com\/file\/commons-on-demand\/(.+)$/i);
    if (match) return 'https://media.commons-on-demand.com/' + match[1];
    return path;
}

/* ── ADMIN ── */
async function secretHandshake(){
    const entry=prompt('Studio access code:');
    if(!entry)return;
    const code=entry.trim();
    try {
        // Side-effect-free way to validate: PUT against a maker id that can't
        // exist matches zero rows either way, but still requires valid auth.
        const res=await fetch(WORKER_URL+'/api/makers/__login_check__', {
            method:'PUT',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+code},
            body:JSON.stringify({name:''})
        });
        if(res.ok){
            authCode=code;
            localStorage.setItem('cod_auth', code);
            isAdmin=true;
            document.body.classList.add('admin-active');
            document.querySelectorAll('.admin-only').forEach(el=>el.style.display='inline-block');
            log('ADMIN // ACTIVE');
        } else {
            authCode=null; localStorage.removeItem('cod_auth');
            isAdmin=false;
            document.body.classList.remove('admin-active');
            document.querySelectorAll('.admin-only').forEach(el=>el.style.display='none');
            alert('Invalid studio code');
        }
    } catch(err) {
        alert('Could not reach server — check your connection.');
    }
    renderMain();
    if(currentMaker)renderCluster();
}

function toggleMode(){document.body.classList.toggle('light-mode');}

async function exportData(){
    try {
        const res=await fetch(WORKER_URL+'/api/data');

        alert('Export failed: '+err.message);
    }
}

function log(msg){document.getElementById('console-display').textContent=msg;}
function pad(n){return String(n).padStart(2,'0');}
function getInitials(name){if(!name)return'?';return name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,3);}

if (isAdmin) {
    document.body.classList.add('admin-active');

}
